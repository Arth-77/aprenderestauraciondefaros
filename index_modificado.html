<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Manual Profesional de Restauración de Faros con Polímero Líquido</title>
<meta name="description" content="Aprende restauración profesional de faros y recupera tu inversión desde tu primer cliente.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===================================================================
   SISTEMA VISUAL — variables de diseño. Si algún día quieres cambiar
   un color o una fuente en TODA la página, hazlo aquí, una sola vez.
   =================================================================== */
:root{
  --negro:#0A0A0A;
  --negro2:#111111;
  --blanco:#FFFFFF;
  --gris:#BDBDBD;
  --verde:#00FF88;      /* único acento: botones, checks, precio, CTA */
  --rojo:#9C2B2B;       /* solo para urgencia o precio anterior */
  --borde:rgba(255,255,255,0.10);
  --radius:22px;
  --ease:cubic-bezier(.22,.9,.32,1);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--negro);color:var(--blanco);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{max-width:100%;display:block;}
.display{font-family:'Bebas Neue',sans-serif;text-transform:uppercase;letter-spacing:.01em;line-height:1.05;margin:0;font-weight:400;}
p{margin:0;}
.container{max-width:980px;margin:0 auto;padding:0 1.25rem;}
section{padding:5rem 0;}
@media(min-width:768px){section{padding:8rem 0;}}
.texto-sec{color:var(--gris);font-size:1.02rem;line-height:1.65;max-width:560px;}
.centro{text-align:center;margin-left:auto;margin-right:auto;}
.verde{color:var(--verde);}
.rojo{color:var(--rojo);}

/* tarjeta de cristal — reutilizada en toda la página */
.glass{background:rgba(255,255,255,0.035);backdrop-filter:blur(16px);border:1px solid var(--borde);border-radius:var(--radius);}

/* botón CTA — el link real se inyecta desde CONTENIDO.enlaces.hotmart */
.btn{font-family:'Inter',sans-serif;font-weight:700;font-size:1rem;border:none;cursor:pointer;border-radius:14px;padding:1.05rem 1.9rem;display:inline-flex;align-items:center;justify-content:center;gap:.5rem;transition:transform .3s var(--ease), filter .3s var(--ease);text-decoration:none;}
.btn-cta{background:var(--verde);color:#06140c;box-shadow:0 10px 34px -10px rgba(0,255,136,.4);}
.btn-cta:hover{transform:scale(1.025);filter:brightness(1.07);}
.btn-cta:active{transform:scale(.98);}
.btn-block{width:100%;}

/* aparición al hacer scroll */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .7s var(--ease), transform .7s var(--ease);}
.reveal.in{opacity:1;transform:translateY(0);}
@media (prefers-reduced-motion: reduce){.reveal{opacity:1;transform:none;transition:none;}}

/* nota de transferencia — aparece igual en 3 secciones, viene de un solo texto */
.nota-transferencia{margin-top:1.4rem;padding:1rem 1.2rem;border-radius:14px;border:1px solid var(--borde);background:rgba(255,255,255,.03);color:var(--gris);font-size:.85rem;line-height:1.55;max-width:520px;}
.nota-transferencia b{color:var(--blanco);}

/* ---------- HERO ---------- */
.hero{padding-top:6rem;padding-bottom:3rem;text-align:center;}
.hero .display{font-size:2.4rem;max-width:720px;margin:1.4rem auto 1rem;}
@media(min-width:768px){.hero .display{font-size:4.2rem;}}
.hero .sub{margin:0 auto 1.6rem;max-width:540px;color:var(--gris);font-size:1.02rem;line-height:1.6;}
.video-box{
    width:100%;
    max-width:420px;
    margin:0 auto 1.8rem;
    border:1px solid var(--borde);
    border-radius:24px;
    overflow:hidden;
    background:#000;
    aspect-ratio:9/16;
    position:relative;
}
.video-box video, .video-box iframe{position:absolute;inset:0;width:100%;height:100%;border:0;object-fit:cover;}
.video-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;color:var(--gris);font-size:.85rem;background:linear-gradient(160deg,#141414,#0a0a0a);}
.video-placeholder .play{width:56px;height:56px;border-radius:50%;background:var(--verde);display:flex;align-items:center;justify-content:center;color:#06140c;font-size:1.4rem;}
.precio-mini{display:flex;align-items:baseline;justify-content:center;gap:.7rem;margin-bottom:1.4rem;}
.precio-mini .actual{font-family:'Bebas Neue',sans-serif;font-size:2.1rem;color:var(--verde);}
.precio-mini .anterior{color:var(--rojo);text-decoration:line-through;font-size:1.05rem;}
.micro-benef{
    color:var(--gris);
    font-size:.85rem;
    margin-top:1.2rem;
    text-align:center;
}

/* ---------- LOGROS (qué vas a lograr) ---------- */
.grid-logros{display:grid;gap:1rem;margin-top:2.4rem;}
@media(min-width:680px){.grid-logros{grid-template-columns:1fr 1fr;}}
.logro{padding:1.5rem;}
.logro h3{font-family:'Inter',sans-serif;font-weight:700;font-size:1.05rem;margin-bottom:.5rem;}
.logro p{color:var(--gris);font-size:.92rem;line-height:1.55;}

/* comparador antes/después — reutilizable */
.comparador{position:relative;width:100%;aspect-ratio:4/3;border-radius:var(--radius);overflow:hidden;border:1px solid var(--borde);cursor:ew-resize;user-select:none;touch-action:none;max-width:560px;margin:2.4rem auto 0;}
.comp-despues,.comp-antes{position:absolute;inset:0;background-size:cover;background-position:center;}
.comp-antes{clip-path:inset(0 calc(100% - var(--pos,50%)) 0 0);}
.ph-antes{background:linear-gradient(150deg,#3a3624,#7a6a32 45%,#4d4626);}
.ph-despues{background:linear-gradient(150deg,#0f1b14,#1c3a28 40%,#cdeede 75%);}
.comp-tag{position:absolute;top:.8rem;font-size:.62rem;font-weight:700;letter-spacing:.05em;padding:.3rem .65rem;border-radius:6px;background:rgba(0,0,0,.6);z-index:3;}
.tag-antes{left:.8rem;color:#ffd773;}
.tag-despues{right:.8rem;color:var(--verde);}
.comp-handle{position:absolute;top:0;bottom:0;left:var(--pos,50%);width:0;z-index:4;}
.comp-handle::before{content:"";position:absolute;top:0;bottom:0;left:0;width:2px;background:rgba(255,255,255,.85);}
.comp-handle .grip{position:absolute;top:50%;left:0;transform:translate(-50%,-50%);width:40px;height:40px;border-radius:50%;background:var(--verde);display:flex;align-items:center;justify-content:center;color:#06140c;font-weight:700;}

/* ---------- INCLUYE ---------- */
.lista-incluye{list-style:none;margin:2.2rem 0 0;padding:0;display:grid;gap:.7rem;max-width:560px;margin-left:auto;margin-right:auto;}
.lista-incluye li{display:flex;gap:.7rem;align-items:flex-start;border:1px solid var(--borde);border-radius:14px;padding:.9rem 1.1rem;background:rgba(255,255,255,.02);}
.lista-incluye .check{color:var(--verde);font-weight:800;flex-shrink:0;}
.lista-incluye .txt b{display:block;font-size:.95rem;margin-bottom:.15rem;}
.lista-incluye .txt span{color:var(--gris);font-size:.85rem;line-height:1.5;}
.tag-proximamente{display:inline-block;margin-left:.4rem;font-size:.62rem;font-weight:700;color:var(--verde);border:1px solid var(--verde);border-radius:99px;padding:.1rem .5rem;vertical-align:middle;}

/* ---------- SOBRE MI ---------- */
.sobremi{display:grid;gap:1.6rem;align-items:center;}
@media(min-width:680px){.sobremi{grid-template-columns:1fr 1fr;}}
.sobremi-fotos{display:grid;grid-template-columns:1.3fr 1fr;gap:.7rem;}
.foto-box{border-radius:18px;overflow:hidden;border:1px solid var(--borde);aspect-ratio:3/4;background:linear-gradient(150deg,#1a1a1a,#0c0c0c);position:relative;}
.foto-box img{width:100%;height:100%;object-fit:cover;}
.foto-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.35);font-size:.72rem;text-align:center;padding:.6rem;}
.sobremi-texto p{color:var(--gris);font-size:.98rem;line-height:1.65;margin-bottom:.7rem;}

/* ---------- TESTIMONIOS ---------- */
.grid-test{display:grid;gap:1rem;margin-top:2.4rem;}
@media(min-width:680px){.grid-test{grid-template-columns:1fr 1fr;}}
.test-card{padding:1.4rem;}
.test-card p.quote{color:var(--gris);font-size:.9rem;line-height:1.55;margin-bottom:.8rem;}
.test-card .autor{font-size:.85rem;font-weight:700;}
.test-card .autor span{color:var(--gris);font-weight:400;font-size:.78rem;}

/* ---------- PRECIO ---------- */
.precio-card{max-width:440px;margin:2.2rem auto 0;padding:2.2rem 1.8rem;text-align:center;}
.precio-card .anterior{color:var(--rojo);text-decoration:line-through;font-size:1.15rem;}
.precio-card .actual{font-family:'Bebas Neue',sans-serif;font-size:3.4rem;color:var(--verde);margin:.2rem 0 .3rem;}
.precio-card .usd{color:var(--gris);font-size:.95rem;margin-bottom:.3rem;}
.precio-card .nota-moneda{color:var(--gris);font-size:.78rem;margin-bottom:1.4rem;}
.precio-card .garantia{display:flex;align-items:center;justify-content:center;gap:.5rem;margin:1.4rem 0;color:var(--gris);font-size:.85rem;}
.precio-card .garantia b{color:var(--verde);}

/* ---------- FAQ ---------- */
.faq-item{border-bottom:1px solid var(--borde);}
.faq-q{cursor:pointer;padding:1.2rem .2rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;}
.faq-q h3{font-family:'Inter',sans-serif;font-weight:600;font-size:.96rem;}
.faq-q .mas{color:var(--verde);font-size:1.3rem;transition:transform .3s var(--ease);flex-shrink:0;}
.faq-item.open .faq-q .mas{transform:rotate(45deg);}
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s var(--ease);}
.faq-a p{color:var(--gris);font-size:.9rem;line-height:1.6;padding:0 .2rem .4rem;}

/* ---------- STICKY CTA ---------- */
.sticky-cta{position:fixed;left:1rem;right:1rem;bottom:1rem;z-index:55;opacity:0;transform:translateY(20px);pointer-events:none;transition:opacity .35s var(--ease), transform .35s var(--ease);padding-bottom:env(safe-area-inset-bottom);}
.sticky-cta.show{opacity:1;transform:translateY(0);pointer-events:auto;}
.sticky-cta .btn{width:100%;font-size:1.02rem;padding:1.05rem;}

/* ---------- FOOTER ---------- */
footer{padding:3rem 0 7rem;border-top:1px solid var(--borde);text-align:center;}
footer .flogo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;margin-bottom:.7rem;text-transform:uppercase;}
footer p{color:rgba(255,255,255,.35);font-size:.74rem;}

/* ===== Ajustes ChatGPT ===== */
#hero-boton{
    display:flex;
    margin:0 auto;
    width:fit-content;
}

.btn-whatsapp{
position:fixed;
bottom:90px;
right:22px;
background:#25D366;
color:white;
padding:12px 18px;
border-radius:999px;
display:flex;
align-items:center;
gap:8px;
font-weight:700;
text-decoration:none;
box-shadow:0 10px 25px rgba(0,0,0,.35);
z-index:999;
transition:.25s;
}
.btn-whatsapp:hover{
transform:scale(1.05);
}

</style>
</head>

<!-- =====================================================================
     MOTOR DE LA PÁGINA — no necesitas editar nada de aquí en adelante.
     Cada función dibuja UNA sección a partir del Panel de Control de arriba.
     Si borras el <section> de una sección, su función simplemente no hace
     nada (no rompe el resto de la página).
     ===================================================================== -->
<script>
/* ---------- ayudante: pone una foto real o deja el diseño de muestra ---------- */
function ponFoto(elId, url){
  const el = document.getElementById(elId);
  if(!el || !url) return;
  el.style.backgroundImage = `url('${url}')`;
  el.style.backgroundSize = 'cover';
  el.style.backgroundPosition = 'center';
}
function ponFotoEnCaja(cajaId, url){
  const caja = document.getElementById(cajaId);
  if(!caja || !url) return;
  caja.innerHTML = `<img src="${url}" alt="">`;
}

/* ---------- enlaces: un solo link de Hotmart para todos los botones ---------- */
function aplicarEnlaces(){
  document.querySelectorAll('.btn-cta-enlace').forEach(b => b.href = ENLACES.hotmart);
}

/* ---------- nota de transferencia: el mismo texto en 3 lugares ---------- */
function aplicarNotaTransferencia(){
  document.querySelectorAll('.nota-transferencia').forEach(el => {
    el.innerHTML = `📲 ${NOTA_TRANSFERENCIA}`;
  });
}

/* ---------- video del hero ---------- */
function renderVideo(){
  const box = document.querySelector('.video-box');
  if(!box || !VIDEO.url) return;
  box.innerHTML = VIDEO.tipo === 'mp4'
    ? `<video
src="${VIDEO.url}"
autoplay
muted
loop
playsinline
preload="metadata"
style="width:100%;height:100%;object-fit:cover;border-radius:24px;">
</video>`
    : `<iframe src="${VIDEO.url}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
}

/* ---------- SECCIÓN 1: HERO ---------- */
function renderHero(){
  const t = document.getElementById('hero-titulo'); if(!t) return;
  t.innerHTML = HERO.titulo;
  document.getElementById('hero-subtitulo').textContent = HERO.subtitulo;
  document.getElementById('hero-precio-anterior').textContent = HERO.precioAnterior;
  document.getElementById('hero-precio-actual').textContent = HERO.precioActual;
  document.getElementById('hero-boton').textContent = HERO.textoBoton;
  document.getElementById('hero-micro').textContent = HERO.microBeneficios;
}

/* ---------- SECCIÓN 2: LOGROS + comparador antes/después ---------- */
function renderLogros(){
  const cont = document.getElementById('logros-grid'); if(!cont) return;
  document.getElementById('logros-titulo').textContent = LOGROS.titulo;
  document.getElementById('logros-subtitulo').textContent = LOGROS.subtitulo;
  cont.innerHTML = LOGROS.tarjetas.map(t => `
    <div class="glass logro reveal">
      <h3>${t.titulo}</h3>
      <p>${t.texto}</p>
    </div>
  `).join('');
  ponFoto('comp-antes', IMAGENES.fotoAntesFaro);
  ponFoto('comp-despues', IMAGENES.fotoDespuesFaro);
}

/* ---------- SECCIÓN 3: INCLUYE ---------- */
function renderIncluye(){
  const cont = document.getElementById('incluye-lista'); if(!cont) return;
  document.getElementById('incluye-titulo').textContent = INCLUYE.titulo;
  cont.innerHTML = INCLUYE.items.map(i => `
    <li class="reveal">
      <span class="check">✓</span>
      <span class="txt"><b>${i.titulo}${i.proximamente ? '<span class="tag-proximamente">Próximamente</span>' : ''}</b><span>${i.texto}</span></span>
    </li>
  `).join('');
}

/* ---------- SECCIÓN 4: SOBRE MÍ ---------- */
function renderSobreMi(){
  const t = document.getElementById('sobremi-titulo'); if(!t) return;
  t.textContent = SOBRE_MI.titulo;
  document.getElementById('sobremi-parrafos').innerHTML =
    SOBRE_MI.parrafos.map(p => `<p>${p}</p>`).join('');
  ponFotoEnCaja('foto-autor-box', IMAGENES.fotoAutor);
  ponFotoEnCaja('foto-polimero-box', IMAGENES.fotoAplicandoPolimero);
}

/* ---------- SECCIÓN 5: TESTIMONIOS ---------- */
function renderTestimonios(){
  const cont = document.getElementById('testimonios-grid'); if(!cont) return;
  document.getElementById('testimonios-titulo').textContent = TESTIMONIOS.titulo;
  cont.innerHTML = TESTIMONIOS.tarjetas.map(t => `
    <div class="glass test-card reveal">
      <p class="quote">“${t.texto}”</p>
      <p class="autor">${t.nombre} <span>· ${t.rol}</span></p>
    </div>
  `).join('');
}

/* ---------- SECCIÓN 6: PRECIO ---------- */
function renderPrecio(){
  const t = document.getElementById('precio-titulo'); if(!t) return;
  t.textContent = PRECIO.titulo;
  document.getElementById('precio-subtitulo').textContent = PRECIO.subtitulo;
  document.getElementById('precio-anterior').textContent = PRECIO.anterior;
  document.getElementById('precio-actual').textContent = PRECIO.actual;
  document.getElementById('precio-usd').textContent = PRECIO.usd;
  document.getElementById('precio-nota-moneda').textContent = PRECIO.notaMoneda;
  document.getElementById('precio-boton').textContent = PRECIO.textoBoton;
  document.getElementById('precio-garantia').textContent = PRECIO.garantiaTexto;
}

/* ---------- SECCIÓN 7: FAQ ---------- */
function renderFAQ(){
  const cont = document.getElementById('faq-lista'); if(!cont) return;
  document.getElementById('faq-titulo').textContent = FAQ.titulo;
  cont.innerHTML = FAQ.preguntas.map(f => `
    <div class="faq-item reveal" data-faq>
      <div class="faq-q"><h3>${f.p}</h3><span class="mas">+</span></div>
      <div class="faq-a"><p>${f.r}</p></div>
    </div>
  `).join('');
  bindFAQ();
}
function bindFAQ(){
  document.querySelectorAll('[data-faq]').forEach(item=>{
    const head = item.querySelector('.faq-q');
    const body = item.querySelector('.faq-a');
    head.addEventListener('click', ()=>{
      const abierto = item.classList.contains('open');
      document.querySelectorAll('[data-faq]').forEach(o=>{ o.classList.remove('open'); o.querySelector('.faq-a').style.maxHeight = null; });
      if(!abierto){ item.classList.add('open'); body.style.maxHeight = body.scrollHeight + 'px'; }
    });
  });
}

/* ---------- comparador antes/después (arrastrable) ---------- */
function initComparador(){
  document.querySelectorAll('.comparador').forEach(el=>{
    const handle = el.querySelector('.comp-handle');
    function setPos(clientX){
      const r = el.getBoundingClientRect();
      let pct = ((clientX-r.left)/r.width)*100;
      pct = Math.max(0,Math.min(100,pct));
      el.style.setProperty('--pos', pct+'%');
    }
    let arrastrando = false;
    handle.addEventListener('pointerdown', e=>{ arrastrando=true; handle.setPointerCapture(e.pointerId); });
    window.addEventListener('pointerup', ()=> arrastrando=false);
    el.addEventListener('pointermove', e=>{ if(arrastrando) setPos(e.clientX); });
    el.addEventListener('click', e=>{ if(!e.target.closest('.comp-handle')) setPos(e.clientX); });
  });
}

/* ---------- aparición al hacer scroll ---------- */
function initReveal(){
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
  },{threshold:.15});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
}

/* ---------- CTA flotante: aparece después del hero ---------- */
function initStickyCTA(){
  const sticky = document.getElementById('sticky-cta');
  const hero = document.getElementById('sec-hero');
  if(!sticky || !hero) return;
  window.addEventListener('scroll', ()=>{
    sticky.classList.toggle('show', hero.getBoundingClientRect().bottom < 0);
  }, {passive:true});
}

/* ---------- arranque ---------- */
renderHero();
renderLogros();
renderIncluye();
renderSobreMi();
renderTestimonios();
renderPrecio();
renderFAQ();
aplicarEnlaces();
aplicarNotaTransferencia();
renderVideo();
initComparador();
initReveal();
initStickyCTA();
document.getElementById('sticky-boton') && (document.getElementById('sticky-boton').textContent = 'Comprar ahora — ' + HERO.precioActual);
</script>
